name: AI Release Pipeline Trigger

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  notify-ai-system:
    name: Hitachi-Advisor
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Read the past two commits to calculate the diff

      # 2. Extract commit data
      - name: Extract Commit Data
        id: extract_data
        run: |
          # Branch data
          BRANCH_NAME=${GITHUB_REF#refs/heads/}

          # Commit sha
          COMMIT_SHA=${GITHUB_SHA}

          # Tag Data (if the current commit is related to a tag)
          TAG_NAME=$(git tag --points-at HEAD || echo "")
          
          # Deduce the development phase from the tags with priority
          if [[ "$TAG_NAME" == *-rc* || "$TAG_NAME" == *-beta* ]]; then
            DEV_PHASE="staging/testing"
          elif [[ "$TAG_NAME" =~ ^v[0-9] ]]; then
            DEV_PHASE="production-release"
          else
            # Fallback to Branch name (Method 1)
            case "$BRANCH_NAME" in
              "main"|"master")
                DEV_PHASE="production"
                ;;
              "develop"|"dev")
                DEV_PHASE="development"
                ;;
              staging*|release*|rc*)
                DEV_PHASE="staging"
                ;;
              feature*)
                DEV_PHASE="feature-draft"
                ;;
              hotfix*)
                DEV_PHASE="hotfix-production"
                ;;
              *)
                DEV_PHASE="experimental"
                ;;
            esac
          fi

          if [ -z "$TAG_NAME" ]; then TAG_NAME="no-tag"; fi

          # Author name and message
          AUTHOR_NAME=$(git log -1 --format='%an')
          AUTHOR_EMAIL=$(git log -1 --format='%ae')
          
          # Role Mock, TODO: evaluate if needed
          if [ "$BRANCH_NAME" == "main" ]; then
            ROLE="Lead/Production"
          else
            ROLE="Developer"
          fi

          # ---------------------------------------------------------
          # Extract modified/added/deleted files lists
          # ---------------------------------------------------------
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            ADDED_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD)
            MODIFIED_FILES=$(git diff --name-only --diff-filter=M HEAD~1 HEAD)
            DELETED_FILES=$(git diff --name-only --diff-filter=D HEAD~1 HEAD)
          else
            # First commit in repository: consider all tracked files as added
            ADDED_FILES=$(git ls-tree -r HEAD --name-only)
            MODIFIED_FILES=""
            DELETED_FILES=""
          fi
          
          # Extract commit msg
          COMMIT_MSG=$(git log -1 --format='%B')

          # Securely inject multiline strings into Github Environment
          EOF_MSG=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "COMMIT_MSG<<$EOF_MSG" >> $GITHUB_ENV
          echo "$COMMIT_MSG" >> $GITHUB_ENV
          echo "$EOF_MSG" >> $GITHUB_ENV

          EOF_ADDED=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "ADDED_FILES<<$EOF_ADDED" >> $GITHUB_ENV
          echo "$ADDED_FILES" >> $GITHUB_ENV
          echo "$EOF_ADDED" >> $GITHUB_ENV

          EOF_MODIFIED=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "MODIFIED_FILES<<$EOF_MODIFIED" >> $GITHUB_ENV
          echo "$MODIFIED_FILES" >> $GITHUB_ENV
          echo "$EOF_MODIFIED" >> $GITHUB_ENV

          EOF_DELETED=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "DELETED_FILES<<$EOF_DELETED" >> $GITHUB_ENV
          echo "$DELETED_FILES" >> $GITHUB_ENV
          echo "$EOF_DELETED" >> $GITHUB_ENV

          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "AUTHOR_NAME=$AUTHOR_NAME" >> $GITHUB_ENV
          echo "AUTHOR_EMAIL=$AUTHOR_EMAIL" >> $GITHUB_ENV
          echo "ROLE=$ROLE" >> $GITHUB_ENV
          echo "DEV_PHASE=$DEV_PHASE" >> $GITHUB_ENV

      # 3. Read eventual security reports
      - name: Read past stages (eventual) security reports 
        id: read_reports
        run: |
          if [ -f "security-report.json" ]; then
            REPORT_CONTENT=$(cat security-report.json)
          else
            REPORT_CONTENT="No security report produced for this commit..."
          fi
          
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "SECURITY_REPORT<<$EOF" >> $GITHUB_ENV
          echo "$REPORT_CONTENT" >> $GITHUB_ENV
          echo "$EOF" >> $GITHUB_ENV

      # 4. Create payload
      - name: Send data to backend
        env:
          WEBHOOK_URL: ${{ secrets.AI_WEBHOOK_URL }}
          WEBHOOK_TOKEN: ${{ secrets.AI_WEBHOOK_SECRET }}
        run: |
          # We use jq split to convert bash multiline strings into JSON arrays
          jq -n \
            --arg project "${{ github.repository }}" \
            --arg branch "$BRANCH_NAME" \
            --arg sha "$GITHUB_SHA" \
            --arg phase "$DEV_PHASE" \
            --arg tag "$TAG_NAME" \
            --arg author_name "$AUTHOR_NAME" \
            --arg author_email "$AUTHOR_EMAIL" \
            --arg role "$ROLE" \
            --arg commit_msg "$COMMIT_MSG" \
            --arg added "$ADDED_FILES" \
            --arg modified "$MODIFIED_FILES" \
            --arg deleted "$DELETED_FILES" \
            --arg security "$SECURITY_REPORT" \
            '{
              project_name: $project,
              branch: $branch,
              commit_sha: $sha,
              development_phase: $phase,
              phase_tag: $tag,
              author: {
                name: $author_name,
                email: $author_email,
                role: $role
              },
              commit_message: $commit_msg,
              files: {
                added: ($added | split("\n") | map(select(length > 0))),
                modified: ($modified | split("\n") | map(select(length > 0))),
                deleted: ($deleted | split("\n") | map(select(length > 0)))
              },
              security_scan_results: $security,
              source: "github_action_push"
            }' > payload.json

          echo "Sending payload to backend..."
          curl -X POST "$WEBHOOK_URL" \
               -H "Content-Type: application/json" \
               -H "Authorization: Bearer $WEBHOOK_TOKEN" \
               -H "Bypass-Tunnel-Reminder: true" \
               -d @payload.json